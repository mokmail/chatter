services:
  backend:
    build:
      context: ./backend
    container_name: chatter-backend
    ports:
      - "8000:8000"
    volumes:
      - chatter-data:/root/.chatter
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: chatter-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chatter-data:
