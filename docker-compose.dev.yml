services:
  backend:
    extends:
      file: docker-compose.yml
      service: backend
    volumes:
      - ./backend:/app
      - chatter-data:/root/.chatter
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-slim
    container_name: chatter-frontend-dev
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  chatter-data:
    driver: local
  frontend_node_modules:
    driver: local
