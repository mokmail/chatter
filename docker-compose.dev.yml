services:
  neo4j:
    image: neo4j:5-community
    container_name: cio-intelligence-hub-neo4j-dev
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cio-intelligence-hub-qdrant-dev
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    extends:
      file: docker-compose.yml
      service: backend
    volumes:
      - ./backend:/app
      - cio-intelligence-hub-data:/root/.cio-intelligence-hub
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-slim
    container_name: cio-intelligence-hub-frontend-dev
    working_dir: /app
    ports:
      - "5175:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  cio-intelligence-hub-data:
    driver: local
  frontend_node_modules:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
  qdrant-data:
    driver: local